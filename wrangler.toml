name = "rss-translator"
main = "src/worker.ts"
compatibility_date = "2024-04-01"

# 每 10 分钟预缓存翻译好的文章正文
[triggers]
crons = ["*/10 * * * *"]

[vars]
RSS_CONFIG = { defaults = { engine = "deepseek", max_articles_per_run = 20, target_lang = "ZH" }, providers = { deeplx = { endpoint = "https://api.deeplx.org", type = "deeplx" }, deepseek = { endpoint = "https://api.deepseek.com/v1/chat/completions", model = "deepseek-v4-flash" }, nvidia = { endpoint = "https://integrate.api.nvidia.com/v1/chat/completions", model = "deepseek-v4-flash" } }, sources = [
  { domains = ["bbc.co.uk", "bbc.com"], engine = "deepseek", id = "bbc-world", name = "BBC World", title = "BBC 国际新闻", translate = true, translate_body = true, url = "https://feeds.bbci.co.uk/news/world/rss.xml" },
  { domains = ["bbc.co.uk", "bbc.com"], engine = "deepseek", id = "bbc-business", name = "BBC Business", title = "BBC 商业", translate = true, translate_body = true, url = "https://feeds.bbci.co.uk/news/business/rss.xml" }
] }
LOG_LEVEL = "info"

[[kv_namespaces]]
binding = "RSS_ARTICLE_CACHE"
id = "df144d8668a14e7c92da5c1545957c6d"
