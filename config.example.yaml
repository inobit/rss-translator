# RSS Translator 配置文件示例
# 复制为 config.yaml 并填入你的配置，然后通过 pnpm run push-config 推送到 KV
#
# 线上通过 RSS_CONFIG KV namespace 下发

defaults:
  engines: # 默认翻译引擎链，按顺序尝试，失败自动流转
    - deepseek
  max_articles_per_run: 20 # 每次 cron 最多缓存文章数
  max_input_tokens: 8192 # 最大输入 token 数
  target_lang: ZH # 目标语言

providers:
  # DeepLX （需设置 DEEPLX_API_KEY secret）
  # deeplx:
  #   type: deeplx
  #   endpoint: https://api.deeplx.org

  # Cloudflare AI 翻译（需设置 CLOUDFLARE_API_KEY secret）
  # cfai:
  #   type: cloudflare
  #   endpoint: https://api.cloudflare.com/client/v4/accounts/YOUR_ACCOUNT_ID/ai/run
  #   model: "@cf/meta/m2m100-1.2b"
  #   api_key_name: CLOUDFLARE_API_KEY

  # Cloudflare Workers AI LLM，OpenAI 兼容（需设置 CLOUDFLARE_API_KEY secret，与 cfai 共用 key）
  # cfllm:
  #   endpoint: https://api.cloudflare.com/client/v4/accounts/YOUR_ACCOUNT_ID/ai/v1/chat/completions
  #   model: "@cf/zai-org/glm-4.7-flash"
  #   api_key_name: CLOUDFLARE_API_KEY

  # DeepSeek（LLM，需设置 DEEPSEEK_API_KEY secret）
  deepseek:
    endpoint: https://api.deepseek.com/v1/chat/completions
    model: deepseek-v4-flash
    max_input_tokens: 1000000

sources:
  - id: example-source
    name: 示例源
    url: https://example.com/rss.xml
    title: 自定义 RSS 标题（可选）
    domains: # 允许代理的文章域名白名单（可选）
      - example.com
    translate: true # 是否翻译 RSS 标题
    translate_body: true # 是否翻译正文 + 改写 link
    # engines: [deepseek] # 可选，用 defaults.engines
  - id: bbc-world
    name: BBC World
    url: https://feeds.bbci.co.uk/news/world/rss.xml
    title: BBC 国际新闻
    domains:
      - bbc.co.uk
      - bbc.com
    translate: true
    translate_body: true
